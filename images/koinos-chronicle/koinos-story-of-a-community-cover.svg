<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Koinos, Story of a community</title>
  <desc id="desc">Editorial title page combining the official Koinos identity with a visual timeline from mining and mainnet to community art and present-day infrastructure.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08080a"/>
      <stop offset="0.58" stop-color="#111017"/>
      <stop offset="1" stop-color="#1d0a33"/>
    </linearGradient>
    <linearGradient id="timelineWash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#050507" stop-opacity="0.22"/>
      <stop offset="0.48" stop-color="#30005e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8c00ff" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="panelFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070709" stop-opacity="0.04"/>
      <stop offset="0.68" stop-color="#070709" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#070709" stop-opacity="0.82"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="25%" r="58%">
      <stop offset="0" stop-color="#7f00ff" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#7f00ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7f00ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="panel1"><rect x="0" y="600" width="400" height="300"/></clipPath>
    <clipPath id="panel2"><rect x="400" y="600" width="400" height="300"/></clipPath>
    <clipPath id="panel3"><rect x="800" y="600" width="400" height="300"/></clipPath>
    <clipPath id="panel4"><rect x="1200" y="600" width="400" height="300"/></clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#background)"/>
  <rect width="1600" height="600" fill="url(#glow)"/>

  <g opacity="0.18" fill="none" stroke="#a34cff">
    <path d="M980 80 C1110 5 1295 22 1395 125 S1512 343 1600 286" stroke-width="2"/>
    <path d="M930 148 C1084 70 1250 95 1334 185 S1478 378 1604 330" stroke-width="1"/>
    <circle cx="1010" cy="70" r="6" fill="#a34cff"/>
    <circle cx="1260" cy="95" r="5" fill="#a34cff"/>
    <circle cx="1395" cy="125" r="7" fill="#a34cff"/>
    <circle cx="1510" cy="330" r="5" fill="#a34cff"/>
  </g>

  <g transform="translate(116 78)">
    <circle cx="42" cy="42" r="42" fill="#5d00b8"/>
    <circle cx="42" cy="42" r="38" fill="#6900cf"/>
    <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round">
      <path d="M42 16 65 29 42 42 19 29Z"/>
      <path d="M19 29v26l23 13 23-13V29"/>
      <path d="M42 42v26"/>
      <path d="M31 36v13l11 6 11-6V36"/>
    </g>
    <text x="112" y="58" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="8">KOINOS</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="116" y="310" fill="#ffffff" font-size="112" font-weight="750" letter-spacing="-4">Koinos,</text>
    <text x="116" y="406" fill="#ffffff" font-size="68" font-weight="400" letter-spacing="-1">Story of a <tspan fill="#b96cff" font-weight="700">community</tspan></text>
    <text x="120" y="474" fill="#c8c4d0" font-size="25" font-weight="400" letter-spacing="1.4">A LIVING CHRONICLE OF THE PEOPLE WHO BUILT,</text>
    <text x="120" y="510" fill="#c8c4d0" font-size="25" font-weight="400" letter-spacing="1.4">TESTED, DEBATED, AND KEPT THE NETWORK ALIVE.</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <line x1="975" y1="410" x2="1515" y2="410" stroke="#8150b6" stroke-width="2"/>
    <g fill="#c6a4ed">
      <circle cx="975" cy="410" r="7"/>
      <circle cx="1155" cy="410" r="7"/>
      <circle cx="1335" cy="410" r="7"/>
      <circle cx="1515" cy="410" r="7"/>
    </g>
    <g fill="#ffffff" font-size="22" font-weight="700">
      <text x="975" y="382">2020</text>
      <text x="1155" y="382">2022</text>
      <text x="1335" y="382">2024</text>
      <text x="1515" y="382">2026</text>
    </g>
    <g fill="#aaa4b3" font-size="15" letter-spacing="1.2">
      <text x="975" y="446">FAIR LAUNCH</text>
      <text x="1155" y="446">MAINNET</text>
      <text x="1335" y="446">HANDOFF</text>
      <text x="1515" y="446">CONTINUITY</text>
    </g>
  </g>

  <rect x="0" y="584" width="1600" height="4" fill="#6b00c8"/>
  <rect x="0" y="588" width="1600" height="12" fill="#bb5dff" opacity="0.14" filter="url(#softGlow)"/>

  <g clip-path="url(#panel1)">
    <image href="2020-koin-mining-announcement.jpg" x="-66" y="600" width="533" height="300" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g clip-path="url(#panel2)">
    <image href="2022-mainnet-transition.png" x="400" y="600" width="530" height="300" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g clip-path="url(#panel3)">
    <image href="2023-koinos-army-journey-art.jpg" x="800" y="480" width="400" height="500" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g clip-path="url(#panel4)">
    <image href="2026-koinos-one-dashboard.png" x="1200" y="600" width="498" height="300" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <rect x="0" y="600" width="1600" height="300" fill="url(#timelineWash)"/>
  <rect x="0" y="600" width="1600" height="300" fill="url(#panelFade)"/>
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="2">
    <line x1="400" y1="600" x2="400" y2="900"/>
    <line x1="800" y1="600" x2="800" y2="900"/>
    <line x1="1200" y1="600" x2="1200" y2="900"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff">
    <g transform="translate(36 836)">
      <text font-size="18" font-weight="700" letter-spacing="2">2020</text>
      <text y="30" font-size="15" fill="#d5d0dc" letter-spacing="1.2">THE MINING COMMUNITY</text>
    </g>
    <g transform="translate(436 836)">
      <text font-size="18" font-weight="700" letter-spacing="2">2022</text>
      <text y="30" font-size="15" fill="#d5d0dc" letter-spacing="1.2">MAINNET ARRIVES</text>
    </g>
    <g transform="translate(836 836)">
      <text font-size="18" font-weight="700" letter-spacing="2">2023</text>
      <text y="30" font-size="15" fill="#d5d0dc" letter-spacing="1.2">CULTURE AND BUILDERS</text>
    </g>
    <g transform="translate(1236 836)">
      <text font-size="18" font-weight="700" letter-spacing="2">2026</text>
      <text y="30" font-size="15" fill="#d5d0dc" letter-spacing="1.2">COMMUNITY STEWARDSHIP</text>
    </g>
  </g>
</svg>
